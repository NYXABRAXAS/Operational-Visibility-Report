<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Operational Visibility Report</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body{font-family:Arial, sans-serif; margin:20px; background-color: #f4f7f6;}
        table{border-collapse:collapse; width: 100%; margin-top:15px; font-size: 11px; background: white;}
        th,td{border:1px solid #bdc3c7; padding:6px; text-align:center;}
        th{background:#ecf0f1; color: #2c3e50; position: sticky; top: 0;}
        .total-row { background: #3498db; color: white; font-weight: bold; }
        .sub-total { background: #fdfdfd; font-weight: bold; color: #2980b9; }
        button{padding:10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold;}
        #msg{margin-left: 15px; font-weight: bold; color: #2980b9;}
    </style>
</head>
<body>

<h2>Operational Visibility Report</h2>
<input type="file" id="file" accept=".xlsx, .xls">
<button onclick="downloadExcel()">Download MIS</button>
<span id="msg"></span>
<div id="table"></div>

<script>
let finalData = {}; 

document.getElementById("file").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = evt.target.result;
            const wb = XLSX.read(data, { type: 'binary' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { raw: true });
            process(rows);
            document.getElementById("msg").innerHTML = "Data Processed ✓";
        } catch (err) { alert("Error: " + err.message); }
    };
    reader.readAsBinaryString(file);
});

/**
 * UPDATED MAPPING: Underwriting moved to CR
 */
function getQueueFromStatus(statusRaw) {
    if (!statusRaw) return "SO";
    const s = statusRaw.toString().toUpperCase().trim();

    // CREDIT QUEUE (CR)
    const crList = [
        "REFER CREDIT MANAGER",
        "FORWARD",
        "CREDIT APPROVAL",
        "CAM-HOLD",
        "RE-SUBMITTED",
        "DOCUMENT REQUEST SUBMITTED",
        "DOC VERIFICATION PENDING",
        "DOC VERIFICATION PENDING(STP CASE-ASM VALIDATION PENDING)",
        "OSV VERIFIED",
        "UNDERWRITING" 
    ];
    if (crList.includes(s)) return "CR";

    // SO QUEUE
    const soList = [
        "DOC UPLOAD PENDING(STP CASE-ASM VALIDATION PENDING)",
        "MODIFY",
        "DISBURSMENT DETAIL PENDING",
        "DOCUMENT REQUEST",
        "CUSTOMER APPLICATION FORM PENDING",
        "BANK VERIFICATION PENDING",
        "SALES DOC REJECTED",
        "DOC UPLOAD PENDING",
        "REFER TO SO",
        "QUERY",
        "DEAL STRUCTURE PENDING",
        "SCORE CARD PENDING",
        "ADD MEMBER",
        "CUSTOMER APPLICATION FORM PENDING (STP CASE-ASM VALIDATION PENDING)",
        "LOAN DETAIL PENDING"
    ];
    if (soList.includes(s)) return "SO";

    // REJECTED (RJ)
    const rjList = [
        "LOAN CANCELLED",
        "COMPLIANCE REJECTED",
        "LOAN DECLINED",
        "DUPLICATE LEAD",
        "BUREAU STATUS PENDING"
    ];
    if (rjList.includes(s)) return "RJ";

    // SANC, OPS, AD
    if (s === "LOAN SANCTIONED") return "SC";
    if (s === "QC" || s === "AUDIT PENDING") return "OPS";
    if (s === "AUTH DONE") return "AD";

    return "SO"; 
}

function process(rows) {
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());

    let map = {};
    rows.forEach(r => {
        let bucket = getQueueFromStatus(r["Status"]);
        let asm = (r["ASMName"] || r["ASM"] || "ONLINE LEAD").toString().trim();
        let rawDate = r["LeadCreatedOn"];
        if (!rawDate) return;

        let dt;
        if (!isNaN(rawDate) && typeof rawDate === 'number') {
            let d = XLSX.SSF.parse_date_code(rawDate);
            dt = new Date(d.y, d.m - 1, d.d);
        } else {
            let p = rawDate.toString().split(/[\/ :\-]/);
            dt = new Date(p[2], p[1] - 1, p[0]);
        }
        if (isNaN(dt.getTime())) return;
        dt.setHours(0,0,0,0);

        if (!map[asm]) {
            const empty = { AD: 0, SO: 0, CR: 0, SC: 0, RJ: 0, OPS: 0, TOTAL: 0 };
            map[asm] = { MTD: {...empty}, WTD: {...empty}, YEST: {...empty}, TODAY: {...empty}, GRAND: 0 };
        }

        // MTD Logic
        if (dt.getMonth() === today.getMonth() && dt.getFullYear() === today.getFullYear()) {
            map[asm].MTD[bucket]++; map[asm].MTD.TOTAL++;
            map[asm].GRAND++;
        }
        if (dt >= weekStart && dt <= today) { map[asm].WTD[bucket]++; map[asm].WTD.TOTAL++; }
        if (dt.getTime() === yesterday.getTime()) { map[asm].YEST[bucket]++; map[asm].YEST.TOTAL++; }
        if (dt.getTime() === today.getTime()) { map[asm].TODAY[bucket]++; map[asm].TODAY.TOTAL++; }
    });
    finalData = map;
    render(map);
}

function render(map) {
    let html = `<table><tr><th rowspan="2">ASM</th><th colspan="7">MTD</th><th colspan="7">WTD</th><th colspan="7">Yesterday</th><th colspan="7">Today</th><th rowspan="2">Grand</th></tr>
    <tr>${'<th>AD</th><th>SO</th><th>CR</th><th>SC</th><th>RJ</th><th>OPS</th><th class="sub-total">TOTAL</th>'.repeat(4)}</tr>`;

    let gTotals = { MTD: {AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, WTD: {AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, YEST: {AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, TODAY: {AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, GRAND: 0 };

    for (let asm in map) {
        let r = map[asm];
        html += `<tr><td>${asm}</td>
        ${['MTD','WTD','YEST','TODAY'].map(k => `<td>${r[k].AD}</td><td>${r[k].SO}</td><td>${r[k].CR}</td><td>${r[k].SC}</td><td>${r[k].RJ}</td><td>${r[k].OPS}</td><td class="sub-total">${r[k].TOTAL}</td>`).join('')}
        <td style="background:#f9f9f9"><b>${r.GRAND}</b></td></tr>`;

        ['MTD','WTD','YEST','TODAY'].forEach(k => {
            ['AD','SO','CR','SC','RJ','OPS','TOTAL'].forEach(b => gTotals[k][b] += r[k][b]);
        });
        gTotals.GRAND += r.GRAND;
    }

    // Summary Total Row
    html += `<tr class="total-row"><td>TOTAL</td>
    ${['MTD','WTD','YEST','TODAY'].map(k => `<td>${gTotals[k].AD}</td><td>${gTotals[k].SO}</td><td>${gTotals[k].CR}</td><td>${gTotals[k].SC}</td><td>${gTotals[k].RJ}</td><td>${gTotals[k].OPS}</td><td>${gTotals[k].TOTAL}</td>`).join('')}
    <td>${gTotals.GRAND}</td></tr></table>`;

    document.getElementById("table").innerHTML = html;
}

function downloadExcel() {
    if (Object.keys(finalData).length === 0) return alert("No data loaded!");
    XLSX.writeFile(XLSX.utils.table_to_book(document.querySelector("table")), "Final_Operational_Report.xlsx");
}
</script>
</body>
</html>
