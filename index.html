<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Operational Visibility Report</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f7f6; }
        .header-bar { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        
        /* TABLE DESIGN */
        table { border-collapse: collapse; width: 100%; font-size: 10px; background: white; table-layout: auto; }
        th, td { border: 1px solid #bdc3c7; padding: 4px 2px; text-align: center; }
        
        /* HEADER COLORS */
        th { background: #eeeeee; color: #333; font-weight: bold; }
        .asm-name { text-align: left; font-weight: bold; padding-left: 5px; width: 160px; background: #fff !important; }
        
        /* PERCENTAGE & TOTAL COLUMN STYLING */
        .pct-col { background-color: #fff9c4; font-weight: bold; color: #d84315; width: 35px; }
        .sub-total { background: #e3f2fd; font-weight: bold; color: #1565c0; }
        .grand-col { background: #f5f5f5; font-weight: bold; }

        /* BLUE TOTAL ROW */
        .total-row { background: #3498db !important; color: white; font-weight: bold; }
        .total-row td { border: 1px solid #2980b9; }

        button { padding: 8px 16px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #msg { font-weight: bold; color: #2980b9; margin-left: 10px; }
    </style>
</head>
<body>

<div class="header-bar">
    <h2 style="margin:0; font-size: 20px;">Operational Visibility Report</h2>
    <input type="file" id="file" accept=".xlsx, .xls">
    <button onclick="downloadExcel()">Download MIS</button>
    <span id="msg"></span>
</div>

<div id="table-output"></div>

<script>
let finalData = {}; 

document.getElementById("file").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = evt.target.result;
            const wb = XLSX.read(data, { type: 'binary' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { raw: true });
            process(rows);
            document.getElementById("msg").innerHTML = "Data Processed ✓";
        } catch (err) { alert("Error: " + err.message); }
    };
    reader.readAsBinaryString(file);
});

/**
 * EXACT MAPPING
 */
function getQueueFromStatus(statusRaw) {
    if (!statusRaw) return "SO";
    const s = statusRaw.toString().toUpperCase().trim();

    const crList = ["REFER CREDIT MANAGER","FORWARD","CREDIT APPROVAL","CAM-HOLD","RE-SUBMITTED",
                    "DOCUMENT REQUEST SUBMITTED","DOC VERIFICATION PENDING",
                    "DOC VERIFICATION PENDING(STP CASE-ASM VALIDATION PENDING)","OSV VERIFIED","UNDERWRITING"];
    if (crList.includes(s)) return "CR";

    const soList = ["DOC UPLOAD PENDING(STP CASE-ASM VALIDATION PENDING)","MODIFY","DISBURSMENT DETAIL PENDING",
                    "DOCUMENT REQUEST","CUSTOMER APPLICATION FORM PENDING","BANK VERIFICATION PENDING",
                    "SALES DOC REJECTED","DOC UPLOAD PENDING","REFER TO SO","QUERY","DEAL STRUCTURE PENDING",
                    "SCORE CARD PENDING","ADD MEMBER",
                    "CUSTOMER APPLICATION FORM PENDING (STP CASE-ASM VALIDATION PENDING)","LOAN DETAIL PENDING"];
    if (soList.includes(s)) return "SO";

    const rjList = ["LOAN CANCELLED","COMPLIANCE REJECTED","LOAN DECLINED","DUPLICATE LEAD","BUREAU STATUS PENDING"];
    if (rjList.includes(s)) return "RJ";

    if (s === "LOAN SANCTIONED") return "SC";
    if (s === "QC" || s === "AUDIT PENDING") return "OPS";
    if (s === "AUTH DONE") return "AD";

    return "SO"; 
}

function process(rows) {
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());

    let map = {};
    rows.forEach(r => {
        let bucket = getQueueFromStatus(r["Status"]);
        let asm = (r["ASMName"] || r["ASM"] || "ONLINE LEAD").toString().trim();
        let rawDate = r["LeadCreatedOn"];
        if (!rawDate) return;

        let dt;
        if (!isNaN(rawDate) && typeof rawDate === 'number') {
            let d = XLSX.SSF.parse_date_code(rawDate);
            dt = new Date(d.y, d.m - 1, d.d);
        } else {
            let p = rawDate.toString().split(/[\/ :\-]/);
            dt = new Date(p[2], p[1] - 1, p[0]);
        }
        if (isNaN(dt.getTime())) return;
        dt.setHours(0,0,0,0);

        if (!map[asm]) {
            const empty = { AD: 0, SO: 0, CR: 0, SC: 0, RJ: 0, OPS: 0, TOTAL: 0 };
            map[asm] = { MTD: {...empty}, WTD: {...empty}, YEST: {...empty}, TODAY: {...empty}, GRAND: 0 };
        }

        if (dt.getMonth() === today.getMonth() && dt.getFullYear() === today.getFullYear()) {
            map[asm].MTD[bucket]++; map[asm].MTD.TOTAL++;
            map[asm].GRAND++;
        }
        if (dt >= weekStart && dt <= today) { map[asm].WTD[bucket]++; map[asm].WTD.TOTAL++; }
        if (dt.getTime() === yesterday.getTime()) { map[asm].YEST[bucket]++; map[asm].YEST.TOTAL++; }
        if (dt.getTime() === today.getTime()) { map[asm].TODAY[bucket]++; map[asm].TODAY.TOTAL++; }
    });
    finalData = map;
    render(map);
}

function render(map) {
    const cols = ['AD','SO','CR','SC','RJ','OPS','TOTAL'];
    let html = `<table>
    <tr>
        <th rowspan="2" class="asm-name">ASM</th>
        <th colspan="8">MTD</th>
        <th colspan="8">WTD</th>
        <th colspan="8">Yesterday</th>
        <th colspan="8">Today</th>
        <th rowspan="2" class="grand-col">Grand</th>
    </tr>
    <tr>`;
    
    // Sub-headers with % column
    for(let i=0; i<4; i++) {
        cols.forEach(c => html += `<th class="${c === 'TOTAL' ? 'sub-total' : ''}">${c}</th>`);
        html += `<th class="pct-col">%</th>`;
    }
    html += `</tr>`;

    let g = { MTD:{AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, WTD:{AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, 
              YEST:{AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, TODAY:{AD:0,SO:0,CR:0,SC:0,RJ:0,OPS:0,TOTAL:0}, GRAND:0 };

    for (let asm in map) {
        let r = map[asm];
        html += `<tr><td class="asm-name">${asm}</td>`;
        ['MTD','WTD','YEST','TODAY'].forEach(k => {
            cols.forEach(c => {
                html += `<td class="${c === 'TOTAL' ? 'sub-total' : ''}">${r[k][c]}</td>`;
                g[k][c] += r[k][c];
            });
            // Calculate % Not in SO
            let notSO = r[k].TOTAL - r[k].SO;
            let pct = r[k].TOTAL > 0 ? ((notSO / r[k].TOTAL) * 100).toFixed(0) : 0;
            html += `<td class="pct-col">${pct}%</td>`;
        });
        html += `<td class="grand-col">${r.GRAND}</td></tr>`;
        g.GRAND += r.GRAND;
    }

    // Final Total Row
    html += `<tr class="total-row"><td class="asm-name" style="color:white">TOTAL</td>`;
    ['MTD','WTD','YEST','TODAY'].forEach(k => {
        cols.forEach(c => html += `<td>${g[k][c]}</td>`);
        let totalNotSO = g[k].TOTAL - g[k].SO;
        let totalPct = g[k].TOTAL > 0 ? ((totalNotSO / g[k].TOTAL) * 100).toFixed(0) : 0;
        html += `<td>${totalPct}%</td>`;
    });
    html += `<td>${g.GRAND}</td></tr></table>`;

    document.getElementById("table-output").innerHTML = html;
}

function downloadExcel() {
    XLSX.writeFile(XLSX.utils.table_to_book(document.querySelector("table")), "Operational_Visibility.xlsx");
}
</script>
</body>
</html>
